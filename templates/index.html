<!DOCTYPE html>
<html>
<head>
    <title>AI Text to Image</title>
    <style>
        body {
            background-color: #1e1e2f;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }
        select, button {
            padding: 10px;
            font-size: 16px;
            margin: 10px;
        }
        img {
            margin-top: 20px;
            width: 250px;
        }
    </style>
</head>
<body>

    <h1>🔥 AI Text to Image Viewer</h1>

    <form method="POST">
        <select name="text" required>
            <option value="" disabled selected>Select an option</option>
            {% for label in labels %}
                <option value="{{ label }}">{{ label }}</option>
            {% endfor %}
        </select>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
        <h3>Confidence: {{ "%.2f"|format(confidence) }}%</h3>
    {% endif %}

    {% if image_file %}
        <img src="{{ url_for('static', filename=image_file) }}">
    {% endif %}

</body>
</html>
